<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Simple Calculator</h1>
    <div>
        <label>Enter the first Name</label>
        <input type="text" id="num1" placeholder="Enter the number">
    </div>
    <hr>
    <div>
        <label>Enter the second number</label>
        <input type="text" id="num2" placeholder="Enter the second number">
    </div>
    <button onclick="addNumber()" >ADD</button>
    <button onclick="divNumber()" >Division</button>
    <button onclick="mulNumber()" >MULTIPLY</button>
    <button onclick="subNumber()" >SUBSTRACT</button>
    <p id="sumValue"></p>


    <script>
        function addNumber(){
            let num1 = document.getElementById("num1").value;
            let num2 = document.getElementById("num2").value;
            let result = parseInt(num1) +parseInt(num2);

            document.getElementById("sumValue").innerHTML = num1+ "+" + num2 +"=" +result; 
        }

        function divNumber(){
            let num1 = document.getElementById("num1").value;
            let num2 = document.getElementById("num2").value;
            let result = parseInt(num1) / parseInt(num2);

            document.getElementById("sumValue").innerHTML = num1+ "/" + num2 +"=" +result; 
        }
          function mulNumber(){
            let num1 = document.getElementById("num1").value;
            let num2 = document.getElementById("num2").value;
            let result = parseInt(num1) * parseInt(num2);

            document.getElementById("sumValue").innerHTML = num1+ "*" + num2 +"=" +result; 
        }
          function subNumber(){
            let num1 = document.getElementById("num1").value;
            let num2 = document.getElementById("num2").value;
            let result = parseInt(num1) -parseInt(num2);

            document.getElementById("sumValue").innerHTML = num1+ "-" + num2 +"=" +result; 
        }


    </script>

    
</body>
</html>
