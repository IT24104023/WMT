<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<h3>Choose a course</h3>

<div class="course">Web Development</div>
<div class="course">Mobile App Development</div>
<div class="course">Data Science</div>

<button onclick="hightLight()"> Hilight Courses</button>

<style>
    .course{
        padding: 10px;
        margin: 5px 0;
        border: 1px solid #ccc;
    }

    .active{
        background-color: aqua;
        font-weight: bold;
    }
</style>

<script>
    function hightLight(){
        let courses = document.getElementsByClassName("course");

        for(let i = 0; i < courses.length; i++){
            courses[i].classList.add("active");
        }

    }

</script>

    
</body>
</html>
