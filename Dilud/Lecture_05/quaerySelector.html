<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <button onclick="cheackval()">Click me</button>
    <p class="para" style="color: red;">Hello world</p>
    <p class="para">Hello world</p>
    <p class="para1">Hello world</p>
    <h3 class="para">Hello world</h3>

     <button onclick="getsourse()">Click me</button><br>
     <a id="myLink" href="123456"></a>
<hr>
     <button onclick="remiveAttribute()">Remove attribute</button>
<hr>
     <button onclick="set()">Set attribute</button>


    <script>
        function cheackval(){
            const paragraph = document.querySelector(".para"); // this retrive the first element that have that name as a class
            paragraph.textContent = "Button Clicked!";
           
           
        }

        function getsourse(){

             const link = document.querySelector("#myLink");
             const sourse = link.getAttribute("href"); // after U call it you can call individual parts from it by using this.
             alert(sourse);
        }

        function remiveAttribute(){
            const paragraph = document.querySelector(".para");
            const remove = paragraph.removeAttribute("style") // this removes attributes like src,style
            paragraph.style.color = "aqua";
        }

        function set(){
            const paragraph = document.querySelector(".para1");
            paragraph.setAttribute("style", "color: red; background-color: yellow; padding: 10px;");
           const newf =  paragraph.hasAttribute("class");
            alert(newf);

        }

    </script>


    
</body>
</html>
